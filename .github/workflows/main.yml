# This file defines your GitHub workflows.

name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.8'

      - name: Install Dependencies
        run: |
          npm install

      - name: Run tests
        run: |
          npm test
